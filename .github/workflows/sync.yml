name: Sync Custom Pico Core

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest version
        id: check_version
        run: |
          UPSTREAM_TAG=$(curl -sL https://api.github.com/repos/earlephilhower/arduino-pico/releases/latest | jq -r .tag_name)
          if [ -z "$UPSTREAM_TAG" ] || [ "$UPSTREAM_TAG" = "null" ]; then
            echo "Failed to fetch upstream tag"
            exit 1
          fi
          
          MY_TAG=$(curl -sL https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name 2>/dev/null || echo "none")
          
          echo "Upstream tag: $UPSTREAM_TAG"
          echo "My tag: $MY_TAG"
          
          if [ "$UPSTREAM_TAG" = "$MY_TAG" ]; then
            echo "Versions match. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=$UPSTREAM_TAG" >> $GITHUB_OUTPUT

      - name: Checkout repository
        if: steps.check_version.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.check_version.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run script
        if: steps.check_version.outputs.skip == 'false'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/filter_core.py

      - name: Create Release
        if: steps.check_version.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.check_version.outputs.version }}
          gh release create "$VERSION" \
            --title "Custom Core $VERSION" \
            --notes "Automated release of custom arduino-pico core version $VERSION" \
            *.tar.gz \
            package_custom_pico_index.json
